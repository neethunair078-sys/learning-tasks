<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Table</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="userdata-section">
        <h1>User data table</h1>
 
        <div class="searchbar">
            <input type="search" placeholder="search here..." id="table-search">
        </div>

        <table cellpadding="0" cellspacing="0" border="0" class="user-table">
            <thead>
                <th>Name</th>
                <th>Email</th>
                <th>City</th>
            </thead>
            <tbody id="tableData">
                <!-- Data -->
            </tbody>
        </table>
    </section>

    <script src="script.js"></script>
</body>

</html>
